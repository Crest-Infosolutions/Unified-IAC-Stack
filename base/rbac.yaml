apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tfe-agent-observer
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tfe-agent-observer
subjects:
  - kind: ServiceAccount
    name: tfe-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tfe-agent-observer