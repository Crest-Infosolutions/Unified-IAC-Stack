apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
data:
  vault.hcl: |
    disable_mlock = true

    ui = true

    storage "raft" {
      path = "/vault/data"
    }

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      containers:
        - name: vault
          image: crest.azurecr.io/hashicorp/vault-enterprise-fips@sha256:9dbcfc5652839c048f80232581efb8d94e09e10b8ca0f0d29a0126e3d07930c9
          command:
            - /bin/sh
            - -c
            - |
              cat /vault/config/vault.hcl
              exec vault server -config=/vault/config/vault.hcl
          env:
            - name: VAULT_API_ADDR
              value: http://0.0.0.0:8200
            - name: VAULT_CLUSTER_ADDR
              value: http://127.0.0.1:8201
            - name: SKIP_CHOWN
              value: "true"
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - IPC_LOCK
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - mountPath: /vault/data
              name: vault-storage
            - mountPath: /vault/config
              name: vault-config
              readOnly: true
      volumes:
        - name: vault-storage
          persistentVolumeClaim:
            claimName: vault-pvc
        - name: vault-config
          configMap:
            name: vault-config
            defaultMode: 0444
---
apiVersion: v1
kind: Service
metadata:
  name: vault
spec:
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201