apiVersion: batch/v1
kind: Job
metadata:
  name: infra-pipeline
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: infra-pipeline
      automountServiceAccountToken: true
      restartPolicy: Never
      containers:
        - name: pipeline
          image: pipeline-image
          env:
            - name: ARM_OIDC_TOKEN_FILE_PATH
              value: /var/run/secrets/azure/tokens/azure-identity-token
          envFrom:
            - configMapRef:
              name: infra-platform-config
            - configMapRef:
                name: infra-pipeline-config
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              get_env_value() {
                printenv "$1" 2>/dev/null || true
              }

              require_value() {
                var_name="$1"
                var_value="$(get_env_value "$var_name")"
                if [ -z "$var_value" ]; then
                  echo "Missing required value for $var_name" >&2
                  exit 1
                fi
              }

              require_repo_value() {
                var_name="$1"
                require_value "$var_name"
                case "$(get_env_value "$var_name")" in
                  */*) ;;
                  *)
                    echo "$var_name must be set to an owner/repository path" >&2
                    exit 1
                    ;;
                esac
              }

              require_uuid_value() {
                var_name="$1"
                require_value "$var_name"
                if [ "$(get_env_value "$var_name")" = "00000000-0000-0000-0000-000000000000" ]; then
                  echo "$var_name must be set to a real Azure identifier" >&2
                  exit 1
                fi
              }

              require_ssh_public_key() {
                require_value TF_VAR_SSH_PUBLIC_KEY
                case "$TF_VAR_SSH_PUBLIC_KEY" in
                  *CHANGE_ME*)
                    echo "TF_VAR_SSH_PUBLIC_KEY must be set to a real SSH public key" >&2
                    exit 1
                    ;;
                esac
              }

              wait_for_vault_login() {
                attempt=1
                max_attempts="${VAULT_READY_MAX_ATTEMPTS:-60}"
                retry_seconds="${VAULT_READY_RETRY_SECONDS:-10}"

                while true; do
                  if VAULT_TOKEN=$(vault write -field=token "$VAULT_AUTH_PATH" role="$VAULT_ROLE" jwt="$JWT" 2>/dev/null); then
                    export VAULT_TOKEN
                    return 0
                  fi

                  if [ "$attempt" -ge "$max_attempts" ]; then
                    echo "Vault role $VAULT_ROLE was not ready after ${max_attempts} attempts" >&2
                    return 1
                  fi

                  echo "Waiting for Vault role $VAULT_ROLE to become ready (${attempt}/${max_attempts})"
                  attempt=$((attempt + 1))
                  sleep "$retry_seconds"
                done
              }

              wait_for_github_token() {
                attempt=1
                max_attempts="${VAULT_SECRET_MAX_ATTEMPTS:-60}"
                retry_seconds="${VAULT_SECRET_RETRY_SECONDS:-10}"

                while true; do
                  if GITHUB_TOKEN=$(vault kv get -field=token "$VAULT_GITHUB_TOKEN_PATH" 2>/dev/null); then
                    export GITHUB_TOKEN
                    return 0
                  fi

                  if [ "$attempt" -ge "$max_attempts" ]; then
                    echo "Vault path $VAULT_GITHUB_TOKEN_PATH did not contain a GitHub token after ${max_attempts} attempts" >&2
                    return 1
                  fi

                  echo "Waiting for Vault GitHub token at $VAULT_GITHUB_TOKEN_PATH (${attempt}/${max_attempts})"
                  attempt=$((attempt + 1))
                  sleep "$retry_seconds"
                done
              }

              require_uuid_value ARM_CLIENT_ID
              require_uuid_value ARM_TENANT_ID
              require_uuid_value ARM_SUBSCRIPTION_ID
              require_repo_value LZ_MODULES_REPO
              require_ssh_public_key

              VAULT_AUTH_PATH="${VAULT_AUTH_PATH:-auth/${VAULT_AUTH_METHOD}/login}"
              JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              wait_for_vault_login
              wait_for_github_token
              OIDC_TOKEN_FILE="${AZURE_FEDERATED_TOKEN_FILE:-${ARM_OIDC_TOKEN_FILE_PATH}}"

              export TF_VAR_github_token="$GITHUB_TOKEN"
              export TF_VAR_admin_username="$TF_VAR_ADMIN_USERNAME"
              export TF_VAR_ssh_public_key="$TF_VAR_SSH_PUBLIC_KEY"
              export ARM_OIDC_TOKEN="$(cat "$OIDC_TOKEN_FILE")"
              export ARM_OIDC_TOKEN_FILE_PATH="$OIDC_TOKEN_FILE"

              git clone "https://x-access-token:${GITHUB_TOKEN}@${GIT_HOST}/${LZ_MODULES_REPO}.git" lz-modules

              if [ "${RUN_PACKER}" = "true" ]; then
                require_repo_value PACKER_REPO
                require_repo_value IMAGE_REGISTRY_REPO
                require_value PACKER_TEMPLATE
                require_value IMAGE_REGISTRY_FILE
                require_value IMAGE_REGISTRY_KEY

                git clone "https://x-access-token:${GITHUB_TOKEN}@${GIT_HOST}/${PACKER_REPO}.git" packer-images
                git clone "https://x-access-token:${GITHUB_TOKEN}@${GIT_HOST}/${IMAGE_REGISTRY_REPO}.git" image-registry

                az login --service-principal \
                  --username "$ARM_CLIENT_ID" \
                  --tenant "$ARM_TENANT_ID" \
                  --federated-token "$(cat "$OIDC_TOKEN_FILE")"

                IMAGE_VERSION="${IMAGE_VERSION:-$(date +%Y.%m.%d%H%M)}"

                cd packer-images
                packer init .
                packer build -var "image_version=$IMAGE_VERSION" "$PACKER_TEMPLATE"

                cd ../image-registry
                jq --arg image_key "$IMAGE_REGISTRY_KEY" --arg image_version "$IMAGE_VERSION" '.[$image_key]=$image_version' "$IMAGE_REGISTRY_FILE" > /tmp/images.json
                mv /tmp/images.json "$IMAGE_REGISTRY_FILE"
                git config --global user.email "${GIT_AUTHOR_EMAIL:-pipeline@local}"
                git config --global user.name "${GIT_AUTHOR_NAME:-pipeline}"
                git add "$IMAGE_REGISTRY_FILE"
                git commit -m "Update ${IMAGE_REGISTRY_KEY} image to ${IMAGE_VERSION}" || true
                git push
                cd ../lz-modules
              else
                cd lz-modules
              fi

              terraform init -reconfigure

              case "$TERRAFORM_ACTION" in
                apply)
                  terraform plan -out /tmp/tfplan
                  terraform apply -auto-approve /tmp/tfplan
                  ;;
                destroy)
                  terraform destroy -auto-approve
                  ;;
                *)
                  echo "Unsupported TERRAFORM_ACTION: $TERRAFORM_ACTION" >&2
                  exit 1
                  ;;
              esac