apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tfeplatform
resources:
  - serviceaccount.yaml
  - job.yaml
configMapGenerator:
  - name: platform-config
    envs:
      - config/platform.env
  - name: infra-pipeline-config
    envs:
      - config/job.env
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: pipeline-image
    newName: ghcr.io/example/pipeline
    newTag: latest
replacements:
  - source:
      kind: ConfigMap
      name: platform-config
      fieldPath: data.ARM_CLIENT_ID
    targets:
      - select:
          kind: ServiceAccount
          name: infra-pipeline
        fieldPaths:
          - metadata.annotations.[azure.workload.identity/client-id]
        options:
          create: true