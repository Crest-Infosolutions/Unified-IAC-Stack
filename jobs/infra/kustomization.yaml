apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tfeplatform
resources:
  - serviceaccount.yaml
  - job.yaml
configMapGenerator:
  - name: infra-platform-config
    envs:
      - config/platform.env
  - name: infra-pipeline-config
    envs:
      - config/job.env
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: pipeline-image
    newName: crest.azurecr.io/unified-iac-stack/pipeline-runner
    digest: sha256:62f9f3cdd4b83f598f2b05561c8eab7a0ef9d14c7153c0980d58e02e6a55823e
replacements:
  - source:
      kind: ConfigMap
      name: infra-platform-config
      fieldPath: data.ARM_CLIENT_ID
    targets:
      - select:
          kind: ServiceAccount
          name: infra-pipeline
        fieldPaths:
          - metadata.annotations.[azure.workload.identity/client-id]
        options:
          create: true