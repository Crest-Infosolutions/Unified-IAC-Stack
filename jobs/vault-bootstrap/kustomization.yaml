apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tfeplatform
resources:
  - serviceaccount.yaml
  - rbac.yaml
  - job.yaml
configMapGenerator:
  - name: vault-bootstrap-config
    envs:
      - config/job.env
  - name: vault-bootstrap-policies
    files:
      - policies/tfe.hcl
      - policies/tfe-agent.hcl
      - policies/infra-pipeline.hcl
      - policies/config-pipeline.hcl
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: pipeline-image
    newName: crest.azurecr.io/unified-iac-stack/pipeline-runner
    newTag: sha-109e1fd90991