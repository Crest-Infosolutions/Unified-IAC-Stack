apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tfeplatform
resources:
  - serviceaccount.yaml
  - rbac.yaml
  - job.yaml
configMapGenerator:
  - name: vault-bootstrap-config
    envs:
      - config/job.env
  - name: vault-bootstrap-policies
    files:
      - policies/tfe.hcl
      - policies/tfe-agent.hcl
      - policies/infra-pipeline.hcl
      - policies/config-pipeline.hcl
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: pipeline-image
    newName: crest.azurecr.io/unified-iac-stack/pipeline-runner
    digest: sha256:62f9f3cdd4b83f598f2b05561c8eab7a0ef9d14c7153c0980d58e02e6a55823e