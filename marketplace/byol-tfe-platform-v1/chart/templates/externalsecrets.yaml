  labels:
    {{- include "byol-tfe-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecretsRefreshInterval | quote }}
  secretStoreRef:
    kind: SecretStore
    name: azure-keyvault
  target:
    name: {{ .Values.kubernetesTfeAgentSecretName }}
    creationPolicy: Owner
