    - extract:
        key: {{ .Values.keyVaultTfeAgentSecretName | quote }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.kubernetesTlsSecretName }}
  namespace: {{ include "byol-tfe-platform.namespace" . }}
  labels:
    {{- include "byol-tfe-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecretsRefreshInterval | quote }}
  secretStoreRef:
    kind: SecretStore
    name: azure-keyvault
  target:
    name: {{ .Values.kubernetesTlsSecretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      engineVersion: v2
      data:
        tls.crt: '{{ `{{ .tlsCrt }}` }}'
        tls.key: '{{ `{{ .tlsKey }}` }}'
  data:
    - secretKey: tlsCrt
      remoteRef:
        key: {{ .Values.keyVaultTlsCrtSecretName | quote }}
    - secretKey: tlsKey
      remoteRef:
        key: {{ .Values.keyVaultTlsKeySecretName | quote }}